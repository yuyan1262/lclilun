{"subject":"公共课3-规范红线","type":"single","title":"【字节】临时维修设备加电测试使用哪种供电？","options":["A.机柜PDU","B.其他机柜排插","C.墙面墙电","D.任意供电均可"],"answer":"C","explain":"临时/下架维修设备只能用墙电，严禁接入机柜PDU，避免业务供电风险。"},
{"subject":"公共课3-规范红线","type":"single","title":"关机重启操作错误的是？","options":["A.必须客户允许才能操作","B.操作前二次核对SN与维修标签","C.运维人员操作时工程师旁站监督","D.可随意断电重启"],"answer":"D","explain":"关机重启属于高危操作，必须授权+核对设备，禁止随意操作。"},
{"subject":"公共课3-规范红线","type":"single","title":"不属于操作违规的是？","options":["A.故障未及时升级反馈","B.测试流程简化不全","C.盲目更换硬件备件","D.个人专业知识储备不足"],"answer":"D","explain":"操作违规指现场执行动作问题，个人能力不足不属于操作违规行为。"},
{"subject":"公共课3-规范红线","type":"single","title":"服务器维修正确说法？","options":["A.未授权可私自升级固件","B.故障恢复后简化流程不上报","C.硬盘容量更大可直接替换上机","D.客户明确禁止的操作一律不做"],"answer":"D","explain":"所有操作必须遵循客户约束，禁止执行客户明令禁止的操作。"},
{"subject":"公共课3-规范红线","type":"single","title":"机房临时设备供电错误操作？","options":["A.使用独立墙插供电","B.不占用业务机柜PDU","C.临时设备直接插机柜UPS PDU","D.专人看管临时设备电源"],"answer":"C","explain":"临时设备禁止接入机柜UPS/PDU，防止抢占业务供电资源。"},
{"subject":"公共课3-规范红线","type":"single","title":"属于S1级严重事故的是？","options":["A.轻微操作失误无业务影响","B.误操作导致服务器宕机、业务中断数据丢失","C.维修慢被客户投诉","D.设备正常老化故障"],"answer":"B","explain":"误操作造成业务中断、数据丢失归类为S1黑事件，属于严重安全事故。"},
{"subject":"公共课3-规范红线","type":"single","title":"维修关键问题描述错误的是？","options":["A.先确认操作是否合规再执行","B.不用确认设备信息直接处理故障","C.优先使用标准流程处理问题","D.风险操作提前上报负责人"],"answer":"B","explain":"所有故障处理前必须核对设备、工单信息，禁止盲目操作。"},
{"subject":"公共课3-规范红线","type":"single","title":"字节机房防静电要求正确的是？","options":["A.只穿防静电工衣即可不用手环","B.仅防静电鞋满足防护要求","C.拆机操作必须佩戴防静电手环","D.不拆机不用任何防静电措施"],"answer":"C","explain":"字节机房拆机硬件操作强制佩戴防静电手环，防止静电击穿元器件。"},
{"subject":"公共课3-规范红线","type":"single","title":"现场三授权不包含？","options":["A.客户授权","B.现场管理授权","C.技术授权","D.系统账号授权"],"answer":"D","explain":"现场三授权：客户授权、现场管理授权、技术负责人授权。"},
{"subject":"公共课3-规范红线","type":"single","title":"六禁令不含私自使用PDU一条，以下哪条属于禁令？","options":["A.空闲时借用机柜PDU充电","B.非工单时段禁止操作客户设备","C.仅内部测试可私用工具","D.客户默许可简化操作流程"],"answer":"B","explain":"六禁令包含：禁止非授权时段操作客户设备、禁止无授权私自改动配置等。"},
{"subject":"公共课3-规范红线","type":"single","title":"字节运维插拔线缆时工程师需要？","options":["A.一旁等候无需关注","B.全程旁站核对操作是否合规","C.去仓库取备件不用在场","D.只记录结果不用监督过程"],"answer":"B","explain":"客户运维执行高危操作时，我方工程师必须全程旁站监督，防止误操作。"},
{"subject":"公共课3-规范红线","type":"single","title":"设备五要素核对不含？","options":["A.机柜编号","B.设备U位","C.UID标识","D.设备物理高度"],"answer":"D","explain":"设备五核对要素：机柜号、U位、UID灯、维修标签、SN序列号。"},
{"subject":"公共课3-规范红线","type":"single","title":"现场三授权不包含？","options":["A.客户授权","B.现场管理授权","C.运维账号授权","D.技术授权"],"answer":"C","explain":"三授权为客户、现场管理、技术负责人三层授权。"},
{"subject":"公共课3-规范红线","type":"single","title":"固件刷新错误做法？","options":["A.确认设备是否定制机型","B.刷新前记录原有固件版本","C.刷新完成校验版本一致性","D.直接刷最新固件不核对机型"],"answer":"D","explain":"固件必须匹配机型与客户定制版本，不能盲目刷最新通用包。"},
{"subject":"公共课3-规范红线","type":"single","title":"字节机房U盘插拔责任方？","options":["A.驻场运维人员","B.我方硬件工程师","C.机房物业","D.设备厂家"],"answer":"A","explain":"字节机房所有U盘、线缆插拔操作仅限客户驻场运维执行，责任归属运维。"},
{"subject":"公共课3-规范红线","type":"single","title":"硬件DOA判定错误的是？","options":["A.上机前元器件物理破损判定DOA","B.上机5天内硬件故障判定DOA","C.工程师操作损坏备件判定DOA","D.出厂自带故障上机短时间损坏判定DOA"],"answer":"C","explain":"人为操作损坏备件不属于原厂DOA故障，无法走换新流程。"},
{"subject":"公共课3-规范红线","type":"single","title":"以下属于低级操作失误的是？","options":["A.无授权擅自重启服务器","B.备件携带错误耽误维修","C.故障排查思路不清晰","D.工具准备不全"],"answer":"A","explain":"无授权开关机、重启属于低级高危操作失误，会触发安全告警。"},
{"subject":"公共课3-规范红线","type":"single","title":"核对SN序列号正确操作？","options":["A.只看首尾几位数字快速核对","B.完整逐位比对工单与设备SN","C.工单标注近似即可不用核对","D.同一机柜设备SN格式一致不用核对"],"answer":"B","explain":"SN序列号必须完整逐位比对，避免混淆同机柜多台设备。"},
{"subject":"公共课3-规范红线","type":"single","title":"硬盘频繁报错需排查链路时正确流程？","options":["A.直接停机拔硬盘排查","B.飞书联系客户申请停机授权再操作","C.现场直接断电处理","D.留言客户后自行操作"],"answer":"B","explain":"停机、硬盘操作必须线上书面获取客户授权，方可执行。"},
{"subject":"公共课3-规范红线","type":"single","title":"判断硬盘槽位错误方式？","options":["A.硬盘故障灯亮就直接更换","B.登录BMC查看SN匹配槽位","C.客户点亮UID标识确认","D.停机核对硬盘SN与工单匹配"],"answer":"A","explain":"仅靠故障灯判断槽位容易误换，必须BMC/UID/SN三重核对。"},
{"subject":"公共课3-规范红线","type":"single","title":"更换主板故障处理思路错误的是？","options":["A.确认机型是否客户定制固件","B.刷新固件后核对FRU信息","C.同步刷新RAID卡配套固件","D.主板更换后系统异常直接推给客户排查系统"],"answer":"D","explain":"更换主板后硬件层面故障优先工程师排查，不可直接移交客户处理。"},
{"subject":"公共课3-规范红线","type":"single","title":"硬盘操作风险沟通错误的是？","options":["A.提前告知客户数据丢失风险","B.引导客户提前备份业务数据","C.标准流程操作无需告知客户风险","D.签署风险确认记录再操作"],"answer":"C","explain":"所有硬盘、阵列操作必须提前告知数据丢失风险并取得客户确认。"},
{"subject":"公共课3-规范红线","type":"single","title":"维修安全员核心工作？","options":["A.协助搬运备件耗材","B.全程监督高危操作，把控安全红线","C.同步处理其他设备故障","D.整理维修工单文档"],"answer":"C","explain":"安全员职责为紧盯风险操作，制止不合规操作，不参与备件搬运、其他维修。"},
{"subject":"公共课3-规范红线","type":"single","title":"安全员禁止操作？","options":["A.协助设备上下架摆放","B.动手操作客户服务器设备","C.记录操作风险点","D.上报违规操作行为"],"answer":"B","explain":"安全员仅监督，禁止动手操作任何客户硬件设备。"},
// ====================== 规范红线 多选 ======================
{"subject":"公共课3-规范红线","type":"multi","title":"高机位上架设备正确操作？","options":["A.使用登高梯作业","B.双人配合抬放设备","C.单人强行举放服务器","D.踩踏服务器机柜登高"],"answer":"AB","explain":"高机位作业必须登高工具+双人协作，禁止踩踏设备、单人负重上架。"},
{"subject":"公共课3-规范红线","type":"multi","title":"阿里机房运维分工正确的是？","options":["A.开关机、插拔线缆由客户运维操作","B.服务器上电开机由我方工程师执行","C.设备信息核对双方共同确认","D.硬件备件更换由我方工程师操作"],"answer":"AD","explain":"阿里机房电源、线缆操作仅限客户运维；硬件拆装、备件更换由我方工程师执行，信息双方共同核对。"},
{"subject":"公共课3-规范红线","type":"multi","title":"机房临时设备供电禁止行为？","options":["A.临时笔记本接入机柜PDU","B.手机充电插服务器USB口","C.临时设备使用独立墙面插座","D.随意调换机柜PDU电源线顺序"],"answer":"ABD","explain":"临时设备仅允许墙插供电，禁止占用机柜PDU、服务器USB充电、改动业务电源线。"},
{"subject":"公共课3-规范红线","type":"multi","title":"客户授权理解错误的是？","options":["A.前期沟通可停机=永久授权","B.网线插拔无需客户授权","C.阵列清除可现场直接操作","D.上次工单授权可复用本次操作"],"answer":"ABCD","explain":"每一次风险操作都需要单次独立授权，历史授权、口头沟通均不能复用。"},
{"subject":"公共课3-规范红线","type":"multi","title":"字节机房禁止私自插拔硬件包含？","options":["A.电源线","B.网线光纤","C.液冷管路接头","D.显示器键鼠","E.U盘移动硬盘"],"answer":"ABCDEF","explain":"字节机房所有线缆、外设、存储介质插拔均禁止我方工程师私自操作。"},
{"subject":"公共课3-规范红线","type":"multi","title":"我方工程师全程禁止操作？","options":["A.服务器开关机断电","B.网线光纤插拔调整","C.外接U盘读写数据","D.笔记本网线接入业务交换机"],"answer":"ABCD","explain":"电源、网线、存储介质类操作全部归属客户运维，工程师不可操作。"},
{"subject":"公共课3-规范红线","type":"multi","title":"字节机房入场规范要求？","options":["A.仅操作工单内指定设备","B.设备轻拿轻放禁止暴力拆装","C.服务器之间私接网线调试","D.不触碰工单外其他设备","E.不触碰机房基础设施配电柜","F.高机位必须使用登高梯"],"answer":"ABDEF","explain":"禁止服务器之间私接网线，会造成机房网络环路故障，其余均为合规要求。"},
{"subject":"公共课3-规范红线","type":"multi","title":"维修前需签署承诺书客户？","options":["A.阿里","B.美团","C.腾讯","D.字节"],"answer":"ABCD","explain":"互联网大厂机房进场维修均要求签署现场操作安全承诺书。"},
{"subject":"公共课3-规范红线","type":"multi","title":"机房入场规范正确描述？","options":["A.全程佩戴防静电手环拆机","B.凭工单登记入场核对身份","C.如实填写机房操作记录单","D.不私自改动机柜布线配置","E.人证一一对应禁止借用工牌","F.机房内禁止嬉戏打闹乱扔杂物"],"answer":"ABCDEF","explain":"全部选项均为机房入场强制规范。"},
{"subject":"公共课3-规范红线","type":"multi","title":"双人维修安全员职责？","options":["A.动手拆装硬件备件","B.监督现场所有风险操作","C.识别操作违规并及时制止","D.记录操作隐患同步上报管理"],"answer":"CD","explain":"安全员只监督不操作设备，负责识别风险、记录上报违规行为。"},
{"subject":"公共课3-规范红线","type":"multi","title":"机房操作六禁令包含？","options":["A.无授权不操作客户设备","B.非工单时段禁止上机操作","C.禁止使用非官方配套工具固件","D.凭经验盲目更换备件不核对型号","E.维修完成必须客户确认验收","F.现场故障第一时间上报禁止隐瞒"],"answer":"ABCEF","explain":"六禁令禁止盲目换件，D为违规行为不属于禁令条款。"},
{"subject":"公共课3-规范红线","type":"multi","title":"字节机房维修前四项安全操作？","options":["A.设备正面粘贴维修标签","B.设备背面粘贴维修标签","C.点亮设备UID定位灯","D.上机前二次核对工单SN与设备匹配"],"answer":"ABCD","explain":"字节标准四步安全确认：前后贴标签、点亮UID、二次核对SN。"},
{"subject":"公共课3-规范红线","type":"multi","title":"客户信息保密要求？","options":["A.不对外泄露机房机柜布局","B.社交平台不发布机房设备照片","C.备件不私自转卖流入二手市场","D.无授权禁止拍摄机房服务器","E.不私自拷贝机房配置文档基线"],"answer":"ABCDE","explain":"全部属于客户机房信息保密红线要求。"},

{"subject":"技术理论","type":"single","title":"CPU散热器螺丝拧紧顺序？","options":["A.对角依次均匀拧紧","B.顺时针一圈拧紧","C.单侧依次拧紧","D.随意拧紧固定即可"],"answer":"A","explain":"对角均匀拧紧防止CPU受力不均压弯基板。"},

];

// 本地缓存
let wrongList = JSON.parse(localStorage.getItem('wrong')) || [];
let collectList = JSON.parse(localStorage.getItem('collect')) || [];
let recordList = JSON.parse(localStorage.getItem('record')) || [];
let curIdx = 0;
let filterType = 'all';
let showList = [];
let selectedOpt = null;

// 弹窗提示
function showTip(text, isRight) {
    const pop = document.getElementById('popTip');
    pop.innerText = text;
    pop.className = 'pop-tip ' + (isRight ? 'pop-right' : 'pop-wrong');
    pop.style.display = 'block';
    setTimeout(()=>{pop.style.display='none'},1500);
}

// 筛选题目
function filterQ() {
    if(filterType === 'all'){
        showList = [...questionList];
    }else if(filterType === 'wrong'){
        showList = wrongList;
    }else{
        showList = questionList.filter(item=>item.type === filterType);
    }
    document.getElementById('totalNum').innerText = showList.length;
    if(showList.length === 0){
        document.getElementById('qTitle').innerText = '当前分类无题目';
        document.getElementById('optWrap').innerHTML = '';
        document.getElementById('ansBox').style.display = 'none';
        return;
    }
    curIdx = 0;
    render();
}

// 渲染当前题目
function render() {
    if(showList.length === 0) return;
    const item = showList[curIdx];
    selectedOpt = null;
    document.getElementById('curNum').innerText = curIdx + 1;
    document.getElementById('qTitle').innerText = `【${item.subject}】${item.title}`;
    // 渲染选项
    let optHtml = '';
    item.options.forEach(opt=>{
        optHtml += `<div class="opt-item" data-val="${opt[0]}" onclick="selectOpt(this,'${opt[0]}')">${opt}</div>`;
    });
    document.getElementById('optWrap').innerHTML = optHtml;
    document.getElementById('ansBox').style.display = 'none';
    // 更新正确率
    let rightCnt = recordList.filter(r=>r.right).length;
    let rate = recordList.length>0 ? Math.round(rightCnt/recordList.length*100) : 0;
    document.getElementById('rate').innerText = rate + '%';
}

// 选择选项 立刻判分提示
function selectOpt(dom, val) {
    if(selectedOpt) return; // 每题只能选一次
    selectedOpt = val;
    const item = showList[curIdx];
    // 标记选中样式
    dom.classList.add('opt-select');
    // 判断对错
    let isRight = false;
    if(item.type === 'multi'){
        let ansArr = item.answer.split('');
        if(ansArr.includes(val)) isRight = true;
    }else{
        if(item.answer === val) isRight = true;
    }
    // 弹窗提示
    if(isRight){
        showTip('回答正确！', true);
        dom.classList.add('opt-right');
    }else{
        showTip('回答错误，查看下方标准答案', false);
        dom.classList.add('opt-wrong');
        // 标红正确选项
        item.options.forEach(opt=>{
            let oVal = opt[0];
            if(item.answer.includes(oVal)){
                document.querySelector(`.opt-item[data-val="${oVal}"]`).classList.add('opt-right');
            }
        })
    }
    // 显示答案解析
    document.getElementById('trueAns').innerText = item.answer;
    document.getElementById('explain').innerText = item.explain;
    document.getElementById('ansBox').style.display = 'block';
    // 保存做题记录
    recordList.push({title:item.title, right:isRight});
    localStorage.setItem('record', JSON.stringify(recordList));
    // 答错加入错题本
    if(!isRight){
        let has = wrongList.some(w=>w.title === item.title);
        if(!has){
            wrongList.push(item);
            localStorage.setItem('wrong', JSON.stringify(wrongList));
        }
    }
}

// 上一题
document.getElementById('prevBtn').onclick = function(){
    if(curIdx > 0){
        curIdx--;
        render();
    }else{
        showTip('已经是第一题', false);
    }
}

// 下一题
document.getElementById('nextBtn').onclick = function(){
    if(curIdx < showList.length - 1){
        curIdx++;
        render();
    }else{
        showTip('已经是最后一题', false);
    }
}

// 收藏题目
function collectQ() {
    const item = showList[curIdx];
    let exist = collectList.some(c=>c.title === item.title);
    if(!exist){
        collectList.push(item);
        localStorage.setItem('collect', JSON.stringify(collectList));
        showTip('收藏成功', true);
    }else{
        showTip('该题已收藏', false);
    }
}

// 切换分类按钮
document.querySelectorAll('.nav button[data-filter]').forEach(btn=>{
    btn.onclick = function(){
        document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        filterType = this.dataset.filter;
        filterQ();
    }
})

// 打开错题本
function openWrongBook() {
    filterType = 'wrong';
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    filterQ();
}

// 模拟测试弹窗
function mockExam() {
    alert('模拟测试功能待开发，可使用专项刷题练习');
}

// 初始化
filterQ();
</script>
