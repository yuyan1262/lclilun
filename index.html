{"subject":"公共课3-规范红线","type":"single","title":"【字节】需要对临时设备或者下架维修的设备进行加电测试，应该选用哪种供电。","options":["A. 使用机柜PDU供电","B. 使用排插从别的机柜供电","C. 使用墙电","D. 以上方式都可以"],"answer":"C","explain":"对临时或下架维修的设备进行加电测试时，应优先选择稳定且规范的墙电供电，机柜PDU严禁给临时设备供电。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】对于关机、重启等操作，下述说法错误的是：","options":["A. 关机、重启等操作必须在客户允许后才能操作","B. 维修过程中关机、重启等操作不必二次核对","C. 特殊客户要求关机、重启需由现场运维操作","D. 严禁工时或损坏操作"],"answer":"B","explain":"维修执行关机、重启关键操作前，必须二次核对设备SN、维修标签，防止误操作业务设备。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】下面哪项不属于操作不规范动作：","options":["A. 提升不及时","B. 测试成绩都不彻底","C. 盲目更换部件","D. 软能力不足"],"answer":"D","explain":"提升不及时、测试不彻底、盲目换件都属于流程操作违规；软能力不足是个人综合能力问题，不属于操作动作不规范。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】服务器维修期间涉及的内容，如下说法正确的是：","options":["A. 高级工程师处理工作时，可以不经要求进行升级","B. 告知故障，重启后机器恢复正常，最后产线通知使用流程即可","C. 更换硬盘时发现新硬盘的容量大于故障盘的容量，可以直接进行更换","D. 严禁操作客户禁止的内容"],"answer":"D","explain":"所有维修操作必须遵守客户禁令，升级、换硬盘都需要授权与兼容性校验，故障恢复也要走完完整维修流程。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】下述关于维修过程中的安全规范描述错误的是：","options":["A. 严禁在机房的任何区域内吸烟，饮水饮食、未经正式授权严禁拍照、录像","B. 机房维修时，设备临时清理时使用机柜 UPS 电源（PDU）","C. 现场维修如没有明确思路，需及时提升技术leader或资深技术支持","D. 若现场发生意外事故，务必在第一时间通知技术leader和项目总指挥人员"],"answer":"B","explain":"临时设备、维修设备禁止接入机柜PDU/UPS，必须使用专用维修墙插供电。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】以下说法正确的是：","options":["A. 确保操作后，系统和业务能够恢复至正常运行状态","B. 工程师在进行换盘操作时，可以边进行交谈，边进行换盘操作","C. 现场思路不清晰时可以尝试操作不用提升","D. 工程师可以偶尔不佩戴防静电手环进行服务"],"answer":"A","explain":"硬件操作必须专注；思路不清禁止盲目操作；拆机全程强制佩戴防静电手环。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】以下属于S1黑事件的是：","options":["A. 在客户端没有违规影响，通过日常监控或其他业务团队反馈工程师存在违反规则的行为","B. 因操作不当导致的设备意外宕机、网络中断、数据丢失等情况对客户业务连续性产生影响或对关键指标产生影响的事件","C. 工程师个人维修不彻底，导致故障复现，引发客户投诉","D. 故障点"],"answer":"B","explain":"S1黑事件定义：操作失误造成业务中断、数据丢失，直接影响客户业务运行的严重事故。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】维修过程中针对关键问题，下述说法中错误的是：","options":["A. 关键问题需要明确的操作是否合规","B. 从前面规定的情况来看，不需要确认和重新定义，但要求不对称或以正确处理的问题，直接影响后续问题","C. 尽量使用相关知识进行实践"],"answer":"B","explain":"处理关键风险问题必须先确认、定义问题，禁止模糊处理，否则会衍生更大故障。"},
{"subject":"公共课3-规范红线","type":"single","title":"【字节】关于字节机房对防静电措施说法正确的是：","options":["A. 必须穿防静电工衣","B. 穿防静电鞋套即可无需佩戴防静电手环","C. 必须佩戴防静电手环","D. 不拆机无需佩戴手环"],"answer":"C","explain":"字节机房硬件操作强制佩戴防静电手环，仅工衣/鞋套不足以防护静电损坏元器件。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】现场服务器严格执行三授权，以下哪项属于三授权：","options":["A. 技术授权","B. 流程授权","C. 系统授权"],"answer":"A","explain":"现场三授权：客户授权、管理授权、技术授权。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】现场服务需严格执行六禁令，下述不属于六禁令的是：","options":["A. 严禁未经授权，私自使用PDU电源","B. 严禁在非授权时段操作（含远程操作）报修设备或其他正常运行设备","C. 严禁使用非浪潮信息发布和客户明令限制的服务软件版本（含工具）"],"answer":"A","explain":"六禁令不含私自使用PDU这条，其余B、C均属于六禁令内容。"},
{"subject":"公共课3-规范红线","type":"single","title":"【字节】字节机房驻场人员在对故障服务器进行相关下电、线缆插拔、插接键盘显示器等动作的时，厂商人员应该做的是：","options":["A. 准备自己所用的备件","B. 签署服务承诺书","C. 在机房外等待","D. 全程关注和核对驻场运维人员操作是否正确操作主机"],"answer":"D","explain":"客户运维执行硬件操作时，我方工程师必须全程旁站监督，及时制止误操作。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】现场操作设备前务必按五星素标记机器，以下哪项不属于五要素。","options":["A. 机器高度","B. U位号","C. 机柜号","D. 维修标签"],"answer":"A","explain":"设备标记五要素：机柜号、U位、UID灯、维修标签、设备SN，不含机器高度。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】现场服务需严格执行三授权，以下哪项不属于三授权。","options":["A. 客户授权","B. 管理授权","C. 运维授权"],"answer":"C","explain":"三授权：客户、管理、技术，无运维授权。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】下列关于固件刷新注意事项说法错误的是：","options":["A. 确认是否是定制化","B. 刷新前备份或记录原固件信息","C. 刷新后核对信息是否正确","D. 直接将固件刷成最新版本"],"answer":"D","explain":"固件不能盲目刷最新版，需确认机型、客户定制、硬件兼容性后方可升级。"},
{"subject":"公共课3-规范红线","type":"single","title":"【字节】字节机房，在服务器上拔插U盘操作的责任方是谁。","options":["A. 机房运维","B. 工程师","C. 以上都是"],"answer":"A","explain":"字节机房所有U盘、线缆、开关机操作仅允许客户运维执行，厂商工程师禁止操作。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】不属于硬件DOA判断通用原则的是：","options":["A. 更换前发现元器件物理损坏，如插槽松动、针脚弯曲、金手指破损等，判为DOA","B. 在服务完成5个工作日内，更换部件故障或性能异常，判为DOA","C. 在服务过程中，因工程师误操作，导致部件产生物损的，则判断为部件DOA"],"answer":"C","explain":"工程师人为损坏备件不属于原厂DOA，不能走DOA流程。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】以下哪些属于低级失误：","options":["A. 误关机、误重启、无停机权限误停机","B. 维修不彻底","C. 携带错误备件","D. 无维修思路"],"answer":"A","explain":"无授权开关机、误重启属于基础流程低级操作失误。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】维修前粘贴维修标签需核对机器SN，下述操作中错误的是：","options":["A. 逐位数字与工单信息仔细比对","B. 点亮UID灯后再到机器后方粘贴维修标识","C. 核对机器SN只需要核对前4位和后3位数字即可，没必要全部核对"],"answer":"C","explain":"SN必须完整逐位比对，截取部分数字极易混淆同机房多台设备。"},
{"subject":"公共课3-规范红线","type":"single","title":"【字节】工程师收到硬盘故障的工单，热线处理建议多次频繁报错要排查链路时工程师应该怎么做。","options":["A. 不管热线建议直接更换故障盘离开","B. 飞书联系客户申请停机排查链路，客户同意后再停机排查","C. 现场直接停机操作","D. 飞书给客户留言要停机排查后便可操作,不管客户是否同意"],"answer":"B","explain":"停机类操作必须取得客户明确书面/线上授权才能执行。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】硬盘槽位确定不准容易引发换错盘，数据业务受损等事故，下述关于硬盘槽位确定方法说法错误的是：","options":["A. 依据硬盘红灯直接换盘","B. BMC下观察SN及对应槽位","C. 通过客户点灯确认","D. 协调停机比对硬盘SN确认"],"answer":"A","explain":"仅依靠故障红灯换盘风险极高，存在指示灯误报、多块故障盘场景，必须配合BMC/UID/SN确认。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】关于更换主板的操作下述哪个说法不正确：","options":["A. 需要明确服务器是否为定制化，确认是否需要刷新定制化固件","B. 刷新完固件后，必须检查固件是否刷新正常，包括FRU","C. 某些客户定制化机型，除了刷新BIOS/BMC，可能还需要刷新SAS/Raid版本","D. 更换主板后无法启动系统，优先让客户检查系统"],"answer":"D","explain":"更换主板后无法开机，优先排查硬件、固件、背板，工程师先排查硬件层面问题。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】涉及数据风险问题，错误的做法是：","options":["A. 动手前一定要和客户沟通了解数据重要性","B. 引导客户做好备份，并沟通签署免责声明","C. 只要按照技术规范操作即可，没必要与客户沟通数据风险和澄清免责"],"answer":"C","explain":"所有硬盘、阵列、停机操作必须告知客户数据风险并签署免责。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】操作员做关键风险动作时，安全员需要做的动作是：","options":["A. 辅助找备件","B. 协助提升","C. 紧盯操作员的动作，做好确认放权","D. 与运维聊天","E. 维修其他报修机器"],"answer":"C","explain":"安全员核心职责：全程监督风险操作，把控安全，禁止参与维修操作。"},
{"subject":"公共课3-规范红线","type":"single","title":"【通用】下述文字安全员职责说法错误的是：","options":["A. 可以帮助上下架","B. 可以操作机器","C. 对安全事故负主要责任","D. 需描述并记录操作员存在的问题"],"answer":"B","explain":"安全员与操作员职责分离，安全员禁止操作任何设备，仅监督。"},

{"subject":"公共课3-规范红线","type":"multi","title":"【阿里】以下关于机房IT带维和工程师职责界面，描述正确的是：","options":["A. 主机关机、重启由机房人员操作","B. 故障服务器开机由工程师操作","C. 核对维护设备信息是否准确由机房人员操作","D. 故障部件更换、插拔由工程师操作"],"answer":"AD","explain":"阿里机房开关机、插拔线缆全部运维操作，硬件更换由工程师执行，设备信息双方共同核对。"},

// 本地存储数据
let wrongList = JSON.parse(localStorage.getItem('wrong')) || [];
let collectList = JSON.parse(localStorage.getItem('collect')) || [];
let answerRecord = JSON.parse(localStorage.getItem('record')) || [];
let curIdx = 0;
let filterType = 'all';
let currentQList = [];

// 渲染题目
function render(){
    // 筛选题库
    if(filterType === 'all'){
        currentQList = [...questionList];
    }else if(filterType === 'wrong'){
        currentQList = [...wrongList];
    }else{
        currentQList = questionList.filter(q=>q.type === filterType);
    }
    document.getElementById('totalNum').innerText = currentQList.length;
    const qWrap = document.getElementById('qTitle');
    const optWrap = document.getElementById('optWrap');
    const ansBox = document.getElementById('ansBox');
    ansBox.style.display = 'none';
    if(currentQList.length === 0){
        qWrap.innerText = "当前分类暂无题目";
        optWrap.innerHTML = "";
        return;
    }
    if(curIdx >= currentQList.length) curIdx = 0;
    const q = currentQList[curIdx];
    document.getElementById('curNum').innerText = curIdx + 1;
    qWrap.innerText = `【${q.subject}】${q.title}`;
    // 渲染选项
    let optHtml = "";
    q.options.forEach(item=>{
        optHtml += `<div class="opt-item" data-val="${item[0]}">${item}</div>`;
    })
    optWrap.innerHTML = optHtml;
    // 绑定点击选项事件
    document.querySelectorAll('.opt-item').forEach(el=>{
        el.onclick = ()=>{
            document.querySelectorAll('.opt-item').forEach(o=>o.classList.remove('opt-select'));
            el.classList.add('opt-select');
            el.dataset.select = el.dataset.val;
        }
    })
    // 计算正确率
    let rightCnt = answerRecord.filter(r=>r.right).length;
    let allCnt = answerRecord.length;
    let rate = allCnt > 0 ? Math.round(rightCnt / allCnt * 100) : 0;
    document.getElementById('rate').innerText = rate + "%";
}

// 提交答案
document.getElementById('submitBtn').addEventListener('click',()=>{
    const sel = document.querySelector('.opt-item[data-select]');
    if(!sel){
        alert("请先选择一个选项！");
        return;
    }
    const selVal = sel.dataset.select;
    const q = currentQList[curIdx];
    const ansBox = document.getElementById('ansBox');
    document.getElementById('trueAns').innerText = q.answer;
    document.getElementById('explain').innerText = q.explain;
    ansBox.style.display = 'block';
    // 标红/绿
    document.querySelectorAll('.opt-item').forEach(el=>{
        const v = el.dataset.val;
        if(v === q.answer){
            el.classList.add('opt-right');
        }else if(v === selVal && v !== q.answer){
            el.classList.add('opt-wrong');
        }
    })
    // 记录作答
    const isRight = selVal === q.answer;
    answerRecord.push({title:q.title,right:isRight});
    localStorage.setItem('record',JSON.stringify(answerRecord));
    // 存入错题本
    if(!isRight){
        const exist = wrongList.some(w=>w.title === q.title);
        if(!exist) wrongList.push(q);
        localStorage.setItem('wrong',JSON.stringify(wrongList));
    }
})

// 下一题
document.getElementById('nextBtn').addEventListener('click',()=>{
    curIdx++;
    render();
})

// 切换分类按钮
document.querySelectorAll('.nav button[data-filter]').forEach(btn=>{
    btn.onclick = function(){
        document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        filterType = this.dataset.filter;
        curIdx = 0;
        render();
    }
})

// 收藏题目
function collectQ(){
    const q = currentQList[curIdx];
    const exist = collectList.some(c=>c.title === q.title);
    if(!exist){
        collectList.push(q);
        localStorage.setItem('collect',JSON.stringify(collectList));
        alert("收藏成功！");
    }else{
        alert("该题已收藏");
    }
}

// 错题本
function openWrongBook(){
    filterType = 'wrong';
    curIdx = 0;
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    render();
}

// 模拟测试弹窗
function mockExam(){
    alert("模拟测试功能待完善，可先使用分类刷题巩固知识点");
}

// 页面初始化
render();
</script>
